<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Last Line</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <header class="app-header">
        <h1>Last Line</h1>
        <button id="statsButton" class="icon-btn" aria-label="Open stats">Stats</button>
      </header>

      <section id="startScreen" class="screen"></section>
      <section id="roundScreen" class="screen hidden"></section>
      <section id="resultScreen" class="screen hidden"></section>

      <footer class="app-footer">Find the final line that completes the pattern.</footer>
    </main>

    <dialog id="howModal" class="modal"></dialog>
    <dialog id="statsModal" class="modal"></dialog>

    <script type="module" src="./game.js"></script>
  </body>
</html>
